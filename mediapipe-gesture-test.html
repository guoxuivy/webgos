<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaPipe 手势识别测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 24px; margin-bottom: 16px; color: #f1f5f9; }
    #container {
      position: relative;
      width: 720px;
      max-width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      background: #1e293b;
    }
    video, canvas {
      display: block;
      width: 100%;
      height: auto;
    }
    canvas { position: absolute; top: 0; left: 0; }
    #status {
      margin-top: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      background: #1e293b;
      font-size: 18px;
      text-align: center;
      min-width: 300px;
    }
    #gesture-name { font-size: 28px; font-weight: bold; color: #38bdf8; }
    #gesture-score { color: #94a3b8; margin-left: 8px; }
    .loading { color: #facc15; }
    .ready { color: #4ade80; }
    #fps { color: #64748b; font-size: 14px; margin-top: 4px; }
    #tips {
      margin-top: 16px;
      padding: 16px 24px;
      border-radius: 8px;
      background: #1e293b;
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.8;
    }
    #tips strong { color: #e2e8f0; }
  </style>
</head>
<body>

<h1>MediaPipe 手势识别</h1>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="status">
  <span class="loading">⏳ 加载模型中...</span>
</div>
<div id="fps"></div>

<div id="tips">
  <strong>支持的手势：</strong>
  👍 Thumb_Up（点赞） |
  ✌️ Victory（胜利） |
  ❤️ ILoveYou（我爱你） |
  👆 Pointing_Up（指向） |
  👌 OK |
  ✋ Open（张开手掌） |
  🤚 None（无识别）
  <br/>
  <strong>提示：</strong>请将手部正对摄像头，保持良好光线，距离摄像头 30-60cm 效果最佳
</div>

<script type="module">
  import { GestureRecognizer, FilesetResolver, DrawingUtils }
    from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm';

  // ---- DOM 元素 ----
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const fpsEl = document.getElementById('fps');

  let gestureRecognizer = null;
  let lastTimestamp = -1;
  let frameCount = 0;
  let lastFpsUpdate = 0;

  // ---- 初始化 MediaPipe ----
  async function initMediaPipe() {
    try {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
      );

      gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            'https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numHands: 2,
      });

      statusEl.innerHTML = '<span class="ready">✅ 模型已就绪</span>';
      startDetection();
    } catch (err) {
      statusEl.innerHTML = `<span style="color:#f87171">❌ 加载失败: ${err.message}</span>`;
      console.error(err);
    }
  }

  // ---- 摄像头初始化 ----
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: 'user' },
        audio: false,
      });
      video.srcObject = stream;

      await new Promise((resolve) => {
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          resolve();
        };
      });

      video.play();
    } catch (err) {
      statusEl.innerHTML = `<span style="color:#f87171">❌ 摄像头访问失败: ${err.message}</span>`;
      console.error(err);
    }
  }

  // ---- 绘制手部骨架 ----
  function drawResults(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results || !results.landmarks) return;

    const drawingUtils = new DrawingUtils(ctx);

    for (const landmarks of results.landmarks) {
      // 绘制连接线
      drawingUtils.drawConnectors(
        landmarks,
        GestureRecognizer.HAND_CONNECTIONS,
        { color: '#38bdf8', lineWidth: 2 }
      );
      // 绘制关键点
      drawingUtils.drawLandmarks(
        landmarks,
        { color: '#facc15', radius: 4, lineWidth: 1 }
      );
    }

    // 显示手势文字
    if (results.gestures && results.gestures.length > 0) {
      const gestures = results.gestures[0];
      console.log(gestures);
      if (gestures && gestures.length > 0) {
        const top = gestures[0];
        const name = top.categoryName || 'None';
        const score = (top.score * 100).toFixed(1);

        const labelEl = document.getElementById('gesture-name');
        if (!labelEl) {
          // 动态更新状态栏
          statusEl.innerHTML = `
            <span id="gesture-name">${name}</span>
            <span id="gesture-score">(${score}%)</span>
          `;
        } else {
          labelEl.textContent = name;
          document.getElementById('gesture-score').textContent = `(${score}%)`;
        }
      }
    }
  }

  // ---- 检测循环 ----
  function startDetection() {
    function detectLoop() {
      if (!gestureRecognizer) return;

      const now = performance.now();

      // 限制检测帧率以提升性能
      if (lastTimestamp > 0 && (now - lastTimestamp) < 30) {
        requestAnimationFrame(detectLoop);
        return;
      }

      if (video.readyState >= 2) {
        const results = gestureRecognizer.recognizeForVideo(video, now);
        drawResults(results);
        lastTimestamp = now;
      }

      // FPS 统计
      frameCount++;
      if (now - lastFpsUpdate > 1000) {
        fpsEl.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsUpdate = now;
      }

      requestAnimationFrame(detectLoop);
    }

    detectLoop();
  }

  // ---- 启动 ----
  await initCamera();
  initMediaPipe();
</script>

</body>
</html>
